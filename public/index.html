<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Prax — Your Universe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="ui-element flex space-x-4 controls-top">
    <button id="view-toggle-btn" class="btn">View: Sphere</button>
    <span id="status-pill" class="status-pill">Local graph</span>
  </div>

  <div class="ui-element add-control">
    <button id="add-btn" class="btn add-btn" aria-label="Add node">+</button>
  </div>

  <aside id="info-panel" class="ui-element" aria-live="polite">
    <div class="info-content">
      <span id="info-type" class="node-type-badge"></span>
      <h2 id="info-title"></h2>
      <p id="info-details"></p>
      <p id="info-body"></p>
      <a id="info-link" href="#" target="_blank" rel="noopener noreferrer" class="btn">Visit Link</a>
      <div id="info-actions" class="info-actions">
        <button id="edit-node-btn" class="btn">Edit</button>
        <button id="delete-node-btn" class="btn danger-btn">Delete</button>
      </div>
    </div>
  </aside>

  <div id="modal-backdrop" class="ui-element" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-container">
      <h2 id="modal-title" class="text-2xl font-bold mb-4">Add a new node</h2>
      <label class="modal-label" for="node-type-input">Node type</label>
      <select id="node-type-input" class="modal-input">
        <option value="link">Link</option>
        <option value="note">Note</option>
      </select>
      <label class="modal-label" for="node-title-input">Title</label>
      <input id="node-title-input" type="text" class="modal-input" placeholder="Title" maxlength="500">
      <div id="node-url-field">
        <label class="modal-label" for="node-url-input">URL</label>
        <input id="node-url-input" type="url" class="modal-input" placeholder="https://example.com">
      </div>
      <div id="node-body-field" hidden>
        <label class="modal-label" for="node-body-input">Note</label>
        <textarea id="node-body-input" class="modal-input modal-textarea" placeholder="Capture the thought or context"></textarea>
      </div>
      <div class="modal-actions">
        <button id="submit-node-btn" class="btn flex-grow bg-blue-600">Add Node</button>
        <button class="btn flex-grow bg-gray-600 modal-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <canvas id="main-canvas"></canvas>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
