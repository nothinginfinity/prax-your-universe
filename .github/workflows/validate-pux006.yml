name: Validate PUX-006

on:
  push:
    branches: [pux-006-validation-tests]
  workflow_dispatch:
    inputs:
      preview_alias:
        description: Stable Cloudflare Worker preview alias
        required: true
        default: pux-006
        type: string

permissions:
  contents: read

concurrency:
  group: prax-pux006-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup