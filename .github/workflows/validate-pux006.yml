name: Validate PUX-006

on:
  push:
    branches: [pux-006-validation-tests]
  workflow_dispatch:
    inputs:
      preview_alias:
        description: Stable Cloudflare Worker preview alias
        required: true
        default: pux-006
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo ok

  preview:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: preview
        run: |
          echo "preview_url=https://example.invalid" >> "$GITHUB_OUTPUT"
          echo "version_id=pending" >> "$GITHUB_OUTPUT"
